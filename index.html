<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Futuras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #f4f7fb;
    color: #1e293b;
}

/* 🔝 HEADER */
.header {
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    font-size: 22px;
    font-weight: 600;
    color: #1e3a8a;
}

.nav {
    display: flex;
    gap: 25px;
}

.nav a {
    text-decoration: none;
    color: #475569;
    font-weight: 500;
    transition: 0.3s;
}

.nav a:hover {
    color: #1e3a8a;
}

/* CONTENIDO */
.title-main {
    text-align: center;
    margin-top: 40px;
    font-size: 28px;
    font-weight: 600;
}

/* TARJETAS */
.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
    padding: 40px;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 35px 20px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

.icon {
    font-size: 38px;
    margin-bottom: 10px;
}

.title {
    font-size: 18px;
    font-weight: 500;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
    font-size: 14px;
}

/* 📱 CELULAR */
@media (max-width: 600px) {
    .header {
        flex-direction: column;
        gap: 10px;
        padding: 15px;
    }

    .nav {
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .container {
        grid-template-columns: 1fr;
        padding: 20px;
    }
}

/* 📲 TABLET */
@media (min-width: 601px) and (max-width: 1024px) {
    .container {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* 💻 PC */
@media (min-width: 1025px) {
    .container {
        grid-template-columns: repeat(4, 1fr);
    }
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">💰 Finanzas Futuras</div>

    <div class="nav">
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Sobre nosotros</a>
        <a href="#">Contacto</a>
    </div>
</div>

<div class="title-main">Gestiona tu dinero de forma inteligente</div>

<div class="container">

    <div class="card" onclick="redirigir('verificacion.html')">
        <div class="icon">💳</div>
        <div class="title">Ahorros</div>
    </div>

    <div class="card" onclick="redirigir('verificacion.html')">
        <div class="icon">📈</div>
        <div class="title">Inversiones</div>
    </div>

    <div class="card" onclick="redirigir('verificacion.html')">
        <div class="icon">🏦</div>
        <div class="title">Préstamos</div>
    </div>

    <div class="card" onclick="redirigir('verificacion.html')">
        <div class="icon">💰</div>
        <div class="title">Negocios</div>
    </div>

</div>

<footer>© 2026 Finanzas Futuras</footer>

<script>
function redirigir(pagina) {
    window.location.href = pagina;
}
</script>

</body>
</html>
