<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificando... - Finanzas Futuras</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #f4f7fb;
    color: #1e293b;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    background: white;
    padding: 15px 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    font-weight: 600;
    color: #1e3a8a;
    text-align: left;
}

/* CONTENEDOR */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.box {
    background: white;
    padding: 50px 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 450px;
    text-align: center;
}

/* SPINNER */
.spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #e2e8f0;
    border-top: 6px solid #1e3a8a;
    border-radius: 50%;
    margin: 0 auto 30px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

h2 {
    color: #1e3a8a;
    margin-bottom: 15px;
    font-size: 22px;
}

p {
    font-size: 15px;
    color: #64748b;
    margin-bottom: 30px;
    line-height: 1.5;
}

/* BARRA DE PROGRESO */
.progress-container {
    width: 100%;
    background-color: #e2e8f0;
    border-radius: 10px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background-color: #1e3a8a;
    border-radius: 10px;
    transition: width 1s linear;
}

.timer-text {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 400;
}

/* No cerrar mensaje */
.warning {
    margin-top: 20px;
    font-size: 12px;
    color: #ef4444;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="header">💰 Finanzas Futuras</div>

<div class="container">
    <div class="box">
        <div class="spinner"></div>
        <h2>Estamos verificando tus datos</h2>
        <p>Por favor, espera un momento mientras procesamos tu información de seguridad. Esto puede tardar unos segundos.</p>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="timer-text">Cargando... <span id="percent">0</span>%</div>

        <div class="warning">⚠️ No cierres ni recargues esta ventana.</div>
    </div>
</div>

<script>
    let timeLeft = 15; // Segundos totales
    let totalTime = 15;
    let progressBar = document.getElementById("progressBar");
    let percentText = document.getElementById("percent");

    let timer = setInterval(function() {
        timeLeft--;
        
        // Calcular porcentaje
        let percentage = ((totalTime - timeLeft) / totalTime) * 100;
        progressBar.style.width = percentage + "%";
        percentText.innerText = Math.round(percentage);

        if (timeLeft <= 0) {
            clearInterval(timer);
            // Aquí pones la página a la que quieres enviar al usuario al final
            window.location.href = "code.html"; 
        }
    }, 1000);
</script>

</body>
</html>
